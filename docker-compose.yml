version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: festiva_backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      args:
        # If you deploy this to the cloud, you can pass the remote backend URL here.
        # Otherwise, for local testing, it defaults to localhost.
        - VITE_API_URL=http://localhost:8000
    container_name: festiva_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
